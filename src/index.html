<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpaper Engine Linux</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a2e; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #status-bar {
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: gray; flex-shrink: 0; }
    #status-dot.ok { background: #4ecca3; }
    #status-dot.warn { background: #f5a623; }
    #status-dot.err { background: #e74c3c; }

    #install-btn {
      margin-left: auto;
      padding: 6px 14px;
      background: #0f3460;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      display: none;
    }
    #install-btn:hover { background: #1a5276; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .card {
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid #0f3460;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .card img { width: 100%; height: 130px; object-fit: cover; display: block; }
    .card-info { padding: 10px; }
    .card-title { font-size: 13px; font-weight: 600; }
    .card-id { font-size: 11px; color: #888; margin-top: 3px; }

    .card-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: #0f3460;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
    .card-btn:hover { background: #4ecca3; color: #1a1a2e; }

    #unsupported {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: #888;
    }
    #unsupported h2 { color: #e74c3c; }
  </style>
</head>
<body>

<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-msg">Checking environment...</span>
  <button id="install-btn" onclick="installPlugin()">Install Plugin</button>
</div>

<div id="grid"></div>
<div id="unsupported">
  <h2>⚠ Unsupported Desktop</h2>
  <p id="unsupported-msg"></p>
</div>

<script>
  const { invoke } = window.__TAURI__.core;

  async function init() {
    const env = await invoke('check_environment');
    const dot = document.getElementById('status-dot');
    const msg = document.getElementById('status-msg');
    const btn = document.getElementById('install-btn');

    msg.textContent = env.message;

    if (!env.supported) {
      dot.className = 'err';
      document.getElementById('grid').style.display = 'none';
      const u = document.getElementById('unsupported');
      u.style.display = 'flex';
      document.getElementById('unsupported-msg').textContent = env.message;
      return;
    }

    if (!env.plugin_installed) {
      dot.className = 'warn';
      btn.style.display = 'block';
    } else {
      dot.className = 'ok';
    }

    loadWallpapers();
  }

  async function loadWallpapers() {
    const items = await invoke('fetch_workshop');
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (const item of items) {
      grid.innerHTML += `
        <div class="card">
          <img src="${item.preview}" alt="${item.title}" />
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div class="card-id">ID: ${item.id}</div>
            <button class="card-btn" onclick="applyWallpaper(${item.id})">Apply</button>
          </div>
        </div>`;
    }
  }

  async function applyWallpaper(id) {
    try {
      await invoke('install_wallpaper', { wallpaperId: id });
      alert('Wallpaper applied!');
    } catch (e) {
      alert('Error: ' + e);
    }
  }

  async function installPlugin() {
    const btn = document.getElementById('install-btn');
    btn.textContent = 'Installing...';
    btn.disabled = true;
    try {
      await invoke('install_plugin');
      location.reload();
    } catch (e) {
      alert('Install failed: ' + e);
      btn.textContent = 'Install Plugin';
      btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
